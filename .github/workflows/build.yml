name: Build VoidLauncher APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify apktool.yml exists (repo root = folder Voids)
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/apktool.yml" ]; then
            echo "ERROR: apktool.yml tidak ditemukan di root repo!"
            echo "Pastikan file-file ini ada di root repo:"
            echo "  apktool.yml"
            echo "  AndroidManifest.xml"
            echo "  smali/"
            echo "  res/"
            ls -la "$GITHUB_WORKSPACE/"
            exit 1
          fi
          echo "✅ apktool.yml ditemukan, siap build"
          cat "$GITHUB_WORKSPACE/apktool.yml"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install apktool 2.9.3
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O /usr/local/lib/apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Build APK
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"

          # FIX: repo root langsung = folder decompiled APK
          # jadi kasih full path GITHUB_WORKSPACE ke apktool b
          apktool b "$GITHUB_WORKSPACE" \
            --output "$GITHUB_WORKSPACE/dist/Void_mod_unsigned.apk" \
            --use-aapt2

          echo "✅ Build selesai"
          ls -lh "$GITHUB_WORKSPACE/dist/"

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore "$GITHUB_WORKSPACE/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Zipalign & Sign APK
        run: |
          sudo apt-get install -y zipalign apksigner -qq

          zipalign -v -p 4 \
            "$GITHUB_WORKSPACE/dist/Void_mod_unsigned.apk" \
            "$GITHUB_WORKSPACE/dist/Void_mod_aligned.apk"

          apksigner sign \
            --ks "$GITHUB_WORKSPACE/debug.keystore" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$GITHUB_WORKSPACE/dist/Void_mod_signed.apk" \
            "$GITHUB_WORKSPACE/dist/Void_mod_aligned.apk"

          echo "✅ Signed APK siap"
          ls -lh "$GITHUB_WORKSPACE/dist/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoidLauncher-Mod
          path: ${{ github.workspace }}/dist/Void_mod_signed.apk
          retention-days: 7

      - name: Summary
        run: |
          echo "### ✅ Build Sukses!" >> $GITHUB_STEP_SUMMARY
          for f in "$GITHUB_WORKSPACE/dist/"*.apk; do
            size=$(du -h "$f" | cut -f1)
            echo "- $(basename $f): **$size**" >> $GITHUB_STEP_SUMMARY
          done
