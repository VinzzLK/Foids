name: Build VoidLauncher Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download apktool 2.9.3
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar \
            -O apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool \
            -O apktool
          chmod +x apktool
          sudo mv apktool /usr/local/bin/apktool
          sudo mv apktool.jar /usr/local/bin/apktool.jar

      - name: Build APK with apktool
        run: |
          apktool b Voids \
            --use-aapt2 \
            --output VoidMod-unsigned.apk \
            --frame-path $HOME/.local/share/apktool/framework

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Zipalign
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/$(ls ${ANDROID_SDK_ROOT}/build-tools | sort -V | tail -1)/zipalign \
            -v -p 4 VoidMod-unsigned.apk VoidMod-aligned.apk

      - name: Sign APK
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/$(ls ${ANDROID_SDK_ROOT}/build-tools | sort -V | tail -1)/apksigner \
            sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out VoidMod-signed.apk \
            VoidMod-aligned.apk

      - name: Verify APK
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/$(ls ${ANDROID_SDK_ROOT}/build-tools | sort -V | tail -1)/apksigner \
            verify --verbose VoidMod-signed.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoidMod-${{ github.run_number }}
          path: VoidMod-signed.apk
          retention-days: 7