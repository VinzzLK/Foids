name: Build VoidLauncher APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify apktool.yml exists
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/apktool.yml" ]; then
            echo "ERROR: apktool.yml tidak ditemukan di root repo!"
            ls -la "$GITHUB_WORKSPACE/"
            exit 1
          fi
          echo "✅ apktool.yml ditemukan"
          cat "$GITHUB_WORKSPACE/apktool.yml"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install apktool 2.9.3
        run: |
          # Taruh di home dir - tidak perlu sudo/permission
          mkdir -p "$HOME/apktool"
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar \
            -O "$HOME/apktool/apktool.jar"
          echo "✅ apktool.jar downloaded"
          java -jar "$HOME/apktool/apktool.jar" --version

      - name: Build APK
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"

          # repo root = isi folder Voids langsung, jadi kasih GITHUB_WORKSPACE
          java -jar "$HOME/apktool/apktool.jar" b "$GITHUB_WORKSPACE" \
            --output "$GITHUB_WORKSPACE/dist/Void_mod_unsigned.apk" \
            --use-aapt2

          echo "✅ Build selesai"
          ls -lh "$GITHUB_WORKSPACE/dist/"

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore "$GITHUB_WORKSPACE/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Zipalign & Sign APK
        run: |
          sudo apt-get install -y zipalign apksigner -qq

          zipalign -v -p 4 \
            "$GITHUB_WORKSPACE/dist/Void_mod_unsigned.apk" \
            "$GITHUB_WORKSPACE/dist/Void_mod_aligned.apk"

          apksigner sign \
            --ks "$GITHUB_WORKSPACE/debug.keystore" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$GITHUB_WORKSPACE/dist/Void_mod_signed.apk" \
            "$GITHUB_WORKSPACE/dist/Void_mod_aligned.apk"

          echo "✅ Signed APK siap"
          ls -lh "$GITHUB_WORKSPACE/dist/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoidLauncher-Mod
          path: ${{ github.workspace }}/dist/Void_mod_signed.apk
          retention-days: 7

      - name: Summary
        run: |
          echo "### ✅ Build Sukses!" >> $GITHUB_STEP_SUMMARY
          for f in "$GITHUB_WORKSPACE/dist/"*.apk; do
            size=$(du -h "$f" | cut -f1)
            echo "- $(basename $f): **$size**" >> $GITHUB_STEP_SUMMARY
          done
