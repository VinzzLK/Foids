name: Build VoidLauncher Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install apktool 2.9.3
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O /usr/local/bin/apktool.jar
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool

      - name: Build APK
        run: |
          apktool b Voids \
            --use-aapt2 \
            --output VoidMod-unsigned.apk

      - name: Setup build-tools path
        run: |
          BUILD_TOOLS=$(ls -1 $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          echo "BUILD_TOOLS_PATH=$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS" >> $GITHUB_ENV

      - name: Zipalign
        run: |
          ${{ env.BUILD_TOOLS_PATH }}/zipalign -v -p 4 VoidMod-unsigned.apk VoidMod-aligned.apk

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Sign APK
        run: |
          ${{ env.BUILD_TOOLS_PATH }}/apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out VoidMod-signed.apk \
            VoidMod-aligned.apk

      - name: Verify
        run: |
          ${{ env.BUILD_TOOLS_PATH }}/apksigner verify --verbose VoidMod-signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VoidMod-${{ github.run_number }}
          path: VoidMod-signed.apk
          retention-days: 7